<script>
  const ESCAPE = 27;
  const RIGHT = 39;
  const LEFT = 37;
  const UP = 38;
  const DOWN = 40;
  const TARGET_CLASS = 'target';

  /*
   * swipe detection
   *
   * found at: https://stackoverflow.com/a/23230280
   */
  document.addEventListener('touchstart', handleTouchStart, false);        
  document.addEventListener('touchmove', handleTouchMove, false);

  let xDown = null;

  function getTouches(evt) {
      return evt.touches ||             // browser API
          evt.originalEvent.touches; // jQuery
  }                                                     
                                                                          
  function handleTouchStart(evt) {
      const firstTouch = getTouches(evt)[0];                                      
      xDown = firstTouch.clientX;                                    
  };                                                
                                                                          
  function handleTouchMove(evt) {
      if ( ! xDown ) {
          return;
      }

      const xUp = evt.touches[0].clientX;

      const xDiff = xDown - xUp;
                                                                          
      if ( xDiff > 0 ) {
          clickNavigationButton('.next');
      } else {
          clickNavigationButton('.previous');
      }
      /* reset values */
      xDown = null;
  };

  /* image sharing */

  const showToast = (text) => {
    if (window.Toastify) {
      Toastify({
        text,
        duration: 3000,
        style: {
          background: "rgba(0, 0, 0, 0.7)"
        }
      }).showToast();
    }
  }

  const copyText = async (text) => {
    if (navigator.clipboard && window.isSecureContext) {
      try {
        await navigator.clipboard.writeText(text);
        showToast("Copied to clipboard");
        return;
      } catch (error) {
        console.warn('Clipboard API failed, falling back to textarea copy.', error);
      }
    }

    const textArea = document.createElement('textarea');
    textArea.value = text;
    textArea.setAttribute('readonly', '');
    textArea.style.position = 'fixed';
    textArea.style.top = '-1000px';
    textArea.style.left = '-1000px';
    document.body.appendChild(textArea);
    textArea.focus();
    textArea.select();

    let copied = false;
    try {
      copied = document.execCommand('copy');
    } catch (error) {
      console.warn('Textarea copy failed, falling back to manual prompt.', error);
    } finally {
      document.body.removeChild(textArea);
    }

    if (copied) {
      showToast("Copied to clipboard");
      return;
    }

    window.prompt('Copy this link:', text);
  }

  const shareImage = async (title, url) => {
    const absoluteUrl = new URL(url, window.location.origin).href;
    const siteTitle = {{ site.env.TITLE | smartify | jsonify }};
    const text = `I found a cool photo over at ${siteTitle}! Check it out!`;
    const shareData = {
      title,
      text,
      url: absoluteUrl
    };

    if (navigator.share && (!navigator.canShare || navigator.canShare(shareData))) {
      try {
        await navigator.share(shareData);
        return;
      } catch (error) {
        if (error.name === 'AbortError') {
          return;
        }
        console.warn('Web Share failed, falling back to copy.', error);
      }
    }

    await copyText(`${text}\n\n${absoluteUrl}`);
  }

  const clickNavigationButton = (buttonClass) => {
    const id = window.history.state && window.history.state.id;
    if (id) {
      const selector = `#${id} ${buttonClass}`;
      const button = document.querySelector(selector);
      button && button.click();
    }
  }

  const openPhoto = (id, href) => {
    const photo = document.getElementById(id);
    const phototitle = photo.getAttribute('title');
    removeTargetClass();
    photo.classList.add(TARGET_CLASS);
    document.title = phototitle;
    {% if site.env.HEADER_ENABLED == "1" %}const title = document.querySelector('head title').getAttribute('data-title');
    document.getElementById('page-title').innerHTML = title + '<span id="breadcrumb">//</span>' + phototitle;{% endif %}
    if (href) {
      window.history.pushState({id: id}, '', href);
    }
  }

  const closePhoto = (href) => {
    const title = document.querySelector('head title').getAttribute('data-title');
    removeTargetClass();
    document.title = title;
    {% if site.env.HEADER_ENABLED == "1" %}document.getElementById('page-title').innerHTML = title;{% endif %}
    if (href) {
      window.history.pushState({}, '', href);
    }
  }

  const removeTargetClass = () => {
    let targets = document.querySelectorAll(`.${TARGET_CLASS}`);
    targets.forEach((target) => {
      target.classList.remove(TARGET_CLASS);
    });
  }

  const handleClick = (selector, event, callback) => {
    if (event.target.matches(selector)) {
      callback();
      event.preventDefault();
    }
  }

  const handleKey = (keyCode, event, callback) => {
    if (event.keyCode === keyCode) {
      callback();
      event.preventDefault();
    }
  }

  const reverseSorting = () => {
    {% if site.env.ALLOW_ORDER_SORT_CHANGE == "1" %}
    const parent = document.getElementById('target');
    const items = Array.from(parent.children);
    for (const item of items) {
      parent.insertBefore(item, parent.firstChild);
    }
    {% endif %}
  }

  window.onpopstate = function(event) {
    if (event.state && event.state.id) {
      const id = event.state.id;
      openPhoto(id, null);
    } else {
      closePhoto(null);
    }
  }

  document.addEventListener('keydown', (event) => {
    handleKey(ESCAPE, event, () => {
      clickNavigationButton('.close');
    });

    handleKey(RIGHT, event, () => {
      clickNavigationButton('.next');
    });

    handleKey(LEFT, event, () => {
      clickNavigationButton('.previous');
    });

    handleKey(UP, event, () => {
      reverseSorting();
    });

    handleKey(DOWN, event, () => {
      reverseSorting();
    });
  });

  document.addEventListener('click', (event) => {
    handleClick('[data-target][href]', event, () => {
      const id = event.target.getAttribute('data-target');
      const href = event.target.getAttribute('href');
      openPhoto(id, href);
    });

    handleClick('[href].close', event, () => {
      const href = event.target.getAttribute('href');
      closePhoto(href);
    });

    handleClick('ul.links li.sort a', event, () => {
      reverseSorting();
    });

    handleClick('a[data-share-url]', event, () => {
      const target = event.target;
      shareImage(
        target.getAttribute('data-share-title'),
        target.getAttribute('data-share-url')
      );
    });
  });

  lazyload();
</script>
